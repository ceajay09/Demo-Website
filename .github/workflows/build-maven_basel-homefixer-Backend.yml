# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: CI for Backend

on:
  pull_request:
    branches:
      - main
    types: [closed]
  push:
    branches:
      - main
    paths:
      - 'My-App_Backend/**'
      - '.github/workflows/build-maven_basel-homefixer-Backend.yml'

jobs:
  build-jar:
    permissions: write-all
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'corretto'
        cache: maven
    - name: Validate package token
      run: |
        if [ -z "$PACKAGES_TOKEN" ]; then
          echo "PACKAGES_TOKEN is empty or not available to this workflow."
          exit 1
        fi
        echo "PACKAGES_TOKEN is available."
      env:
        PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
    - name: Configure Maven for GitHub Packages
      run: |
        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml <<'EOF'
        <settings>
          <servers>
            <server>
              <id>github</id>
              <username>ceajay09</username>
              <password>${env.PACKAGES_TOKEN}</password>
            </server>
          </servers>
          <profiles>
            <profile>
              <id>github-packages</id>
              <repositories>
                <repository>
                  <id>github</id>
                  <url>https://maven.pkg.github.com/ceajay09/shared-backend-parent</url>
                </repository>
              </repositories>
            </profile>
          </profiles>
          <activeProfiles>
            <activeProfile>github-packages</activeProfile>
          </activeProfiles>
        </settings>
        EOF
      env:
        PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
    - name: Build Backend with Maven
      run: |
          cd My-App_Backend
          mvn -B package --file pom.xml
      env:
        PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
    - name: Archive Backend Jar
      uses: actions/upload-artifact@v4
      with:
        name: backend-jar
        path: |
          My-App_Backend/target/*.jar

    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
      with:
        directory: My-App_Backend

  push-to-aws:
    needs: build-jar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Download jar from build-jar job
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: My-App_Backend/target

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-central-1
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: private

      - name: Build, tag, and push docker image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: basel-homefixer-backend
          IMAGE_TAG: dev
        run: |
          cd My-App_Backend
          echo $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
